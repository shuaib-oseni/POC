name: SAST & Secret Scanning

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip3 install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --sarif \
            --output=semgrep.sarif \
            --error || true

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif

      - name: Import to DefectDojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
        run: |
          SARIF_FILE=$(find $HOME -name "semgrep.sarif" 2>/dev/null | head -1)
          echo "Found SARIF at: $SARIF_FILE"
          curl -s -X POST \
            "${DOJO_URL}/api/v2/import-scan/" \
            -H "Authorization: Token ${DOJO_KEY}" \
            -F "scan_type=SARIF" \
            -F "engagement=${ENGAGEMENT_ID}" \
            -F "file=@${SARIF_FILE}" \
            -F "active=true" \
            -F "verified=false" \
            -F "close_old_findings=true" \
            -F "scan_date=$(date +%Y-%m-%d)"

      - name: Debug - find sarif file
        run: |
          echo "GITHUB_WORKSPACE: $GITHUB_WORKSPACE"
          echo "HOME: $HOME"
          find $HOME -name "*.sarif" 2>/dev/null
          find /tmp -name "*.sarif" 2>/dev/null
          ls -la

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ""
        with:
          args: detect --source . --report-format json --report-path gitleaks.json --exit-code 0

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.json

      - name: Import to DefectDojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
        run: |
          GL_FILE=$(find $HOME -name "gitleaks.json" 2>/dev/null | head -1)
          echo "Found Gitleaks report at: $GL_FILE"
          curl -s -X POST \
            "${DOJO_URL}/api/v2/import-scan/" \
            -H "Authorization: Token ${DOJO_KEY}" \
            -F "scan_type=Gitleaks Scan" \
            -F "engagement=${ENGAGEMENT_ID}" \
            -F "file=@${GL_FILE}" \
            -F "active=true" \
            -F "verified=false" \
            -F "close_old_findings=true" \
            -F "scan_date=$(date +%Y-%m-%d)"