name: SAST & Secret Scanning

on:
  push:
    branches: ["main", "develop"]
  pull_request:

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip3 install semgrep

      - name: Run Semgrep
        run: |
          semgrep scan \
            --config=auto \
            --sarif \
            --error 2>/dev/null > results.sarif || true
          echo "File size: $(wc -c < results.sarif)"
          echo "First 100 chars: $(head -c 100 results.sarif)"
          ls -la results.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: results.sarif

      - name: Import to DefectDojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
        run: |
          echo "Importing from: $PWD/results.sarif"
          ls -la results.sarif
          curl -s -X POST \
            "${DOJO_URL}/api/v2/import-scan/" \
            -H "Authorization: Token ${DOJO_KEY}" \
            -F "scan_type=SARIF" \
            -F "engagement=${ENGAGEMENT_ID}" \
            -F "file=@results.sarif" \
            -F "active=true" \
            -F "verified=false" \
            -F "close_old_findings=true" \
            -F "scan_date=$(date +%Y-%m-%d)"

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ""
        with:
          args: detect --source . --report-format json --report-path gitleaks.json --exit-code 0

      - name: Debug Gitleaks
        run: |
          echo "Current dir:"
          ls -la
          echo "Searching for gitleaks report:"
          find $HOME -name "gitleaks.json" 2>/dev/null || echo "Not found"

      - name: Upload Gitleaks artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks.json

      - name: Import to DefectDojo
        env:
          DOJO_URL: ${{ secrets.DEFECTDOJO_URL }}
          DOJO_KEY: ${{ secrets.DEFECTDOJO_API_KEY }}
          ENGAGEMENT_ID: ${{ secrets.DEFECTDOJO_ENGAGEMENT_ID }}
        run: |
          GL_FILE=$(find $HOME -name "gitleaks.json" 2>/dev/null | head -1)
          echo "Found Gitleaks report at: $GL_FILE"
          ls -la ${GL_FILE}
          curl -s -X POST \
            "${DOJO_URL}/api/v2/import-scan/" \
            -H "Authorization: Token ${DOJO_KEY}" \
            -F "scan_type=Gitleaks Scan" \
            -F "engagement=${ENGAGEMENT_ID}" \
            -F "file=@${GL_FILE}" \
            -F "active=true" \
            -F "verified=false" \
            -F "close_old_findings=true" \
            -F "scan_date=$(date +%Y-%m-%d)"